<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>724财讯 - 智能财经资讯</title>
    <script>
        // 检测设备类型并跳转
        (function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // 检测移动设备
            var isMobile = /Mobile|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);

            // 获取当前路径和查询参数
            var currentPath = window.location.pathname;
            var searchParams = window.location.search;
            var hash = window.location.hash;

            if (isMobile) {
                // 移动设备：跳转到 _m 版本
                if (currentPath.includes('auth.html') || currentPath === '/') {
                    window.location.href = 'auth_m.html' + searchParams + hash;
                } else {
                    window.location.href = 'index_user_m.html' + searchParams + hash;
                }
            } else {
                // 桌面设备：跳转到正常版本
                if (currentPath === '/') {
                    window.location.href = 'index_user.html' + searchParams + hash;
                } else if (currentPath.includes('auth.html')) {
                    // 已经在auth.html，不跳转
                } else {
                    window.location.href = 'index_user.html' + searchParams + hash;
                }
            }
        })();
    </script>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
        <div style="text-align: center; color: white;">
            <div style="width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-center; margin: 0 auto 20px; animation: spin 1s linear infinite;">
                <i class="fas fa-bolt" style="font-size: 40px;"></i>
            </div>
            <h1 style="font-size: 24px; margin-bottom: 10px;">724财讯</h1>
            <p style="font-size: 16px; opacity: 0.9;">正在跳转...</p>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</body>
</html>
